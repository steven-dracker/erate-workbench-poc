# .github/workflows/ci.yml
#
# CI — Continuous Integration
#
# Runs on every push and pull request.
# Current scope: restore → build → test.
#
# Extension points (future jobs can be added after the 'test' job):
#   security:   SAST (CodeQL), dependency review, secrets scanning
#   package:    publish artifacts, Docker image build
#   release:    tag-triggered release workflow
#   deploy:     environment-specific deployment jobs

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Validate: restore and build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      - name: Build
        run: dotnet build ErateWorkbench.sln --no-restore --configuration Release

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      - name: Build
        run: dotnet build ErateWorkbench.sln --no-restore --configuration Release

      - name: Run tests
        run: >
          dotnet test ErateWorkbench.sln
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=normal"

  # ── Security (placeholder — future) ──────────────────────────────────────
