# .github/workflows/ci.yml
#
# CI — Continuous Integration
#
# Runs on every push and pull request.
# Current pipeline shape:
#   build → test → ui-smoke
#                → security   (parallel with ui-smoke)
#
# Future extension points:
#   package:    publish artifacts, Docker image build
#   release:    tag-triggered release workflow
#   deploy:     environment-specific deployment jobs

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      - name: Build
        run: dotnet build ErateWorkbench.sln --no-restore --configuration Release

  # ── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      - name: Build
        run: dotnet build ErateWorkbench.sln --no-restore --configuration Release

      # Targets the unit test project only; UITests require a running app (see ui-smoke job)
      - name: Run unit tests
        run: >
          dotnet test tests/ErateWorkbench.Tests/ErateWorkbench.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=normal"

  # ── UI Smoke Tests ────────────────────────────────────────────────────────
  ui-smoke:
    name: UI Smoke Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      - name: Build
        run: dotnet build ErateWorkbench.sln --no-restore --configuration Release

      # Install Playwright browser system dependencies (Ubuntu runner supports sudo)
      - name: Install Playwright browser dependencies
        run: sudo apt-get install -y libnss3 libnspr4 libasound2t64

      # Install the Playwright Chromium browser binary
      - name: Install Playwright Chromium
        run: dotnet tool install --global Microsoft.Playwright.CLI && playwright install chromium

      # Start the API in the background; SQLite DB is created fresh from EF migrations
      - name: Start application
        run: |
          ASPNETCORE_URLS="http://localhost:5000" \
            dotnet run --project src/ErateWorkbench.Api/ErateWorkbench.Api.csproj \
            --no-build --no-launch-profile --configuration Release \
            > /tmp/app.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      # Wait for /health before running tests
      - name: Wait for app readiness
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && echo "App ready." && break
            echo "Waiting... ($i/30)"
            sleep 1
          done

      # Run Playwright smoke tests; APP_BASE_URL is read by SmokeTests.cs
      - name: Run UI smoke tests
        env:
          APP_BASE_URL: http://localhost:5000
        run: >
          dotnet test tests/ErateWorkbench.UITests/ErateWorkbench.UITests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=normal"

      # Upload Playwright traces/screenshots if tests fail (useful for debugging CI failures)
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: tests/ErateWorkbench.UITests/playwright-artifacts/
          retention-days: 7

      # Stop the background app
      - name: Stop application
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill -TERM "$APP_PID" 2>/dev/null || true
          fi

  # ── Security: Dependency Vulnerability Scan ───────────────────────────────
  #
  # Scans NuGet packages for known vulnerabilities using the built-in
  # `dotnet list package --vulnerable` command backed by the NuGet advisory DB.
  #
  # Two-tier approach:
  #   - Direct dependencies:    FAIL on any finding (highest priority; production-facing)
  #   - Transitive dependencies: WARN only (lower priority; often test-only or non-exploitable)
  #
  # Future extension points in this job:
  #   - CodeQL SAST analysis (add a step using github/codeql-action)
  #   - Secrets scanning (add trufflesecurity/trufflehog or similar)
  #   - License compliance check (dotnet list package + custom policy)
  #   - SARIF upload to GitHub Security tab (requires GitHub Advanced Security or public repo)
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: test   # Runs in parallel with ui-smoke; both need test to pass first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ErateWorkbench.sln

      # Tier 1: Check direct dependencies — fail the build if any are vulnerable.
      # Direct vulnerable packages represent an active, addressable risk.
      - name: Check direct dependencies for vulnerabilities
        run: |
          output=$(dotnet list package --vulnerable 2>&1)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable direct NuGet packages detected. Update the affected packages."
            exit 1
          fi
          echo "✓ No vulnerable direct packages found."

      # Tier 2: Check transitive dependencies — report but do not fail.
      # Transitive findings (dependencies of dependencies) are often test-only
      # or non-exploitable in this context. They are surfaced for visibility.
      - name: Check transitive dependencies for vulnerabilities (informational)
        run: |
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::warning::Vulnerable transitive NuGet packages found. Review and update when possible."
          else
            echo "✓ No vulnerable transitive packages found."
          fi
