  <rect x="13" y="20" width="7" height="18" rx="1.5" fill="#4da6ff"/>
  <rect x="24" y="12" width="7" height="26" rx="1.5" fill="#4da6ff"/>
  <rect x="35" y="4"  width="7" height="34" rx="1.5" fill="#60cfff"/>
  <!-- Wordmark -->
  <text x="52" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="#ffffff">ERATE</text>
  <text x="110" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" letter-spacing="-0.3" fill="#adb5bd">Workbench</text>
  <!-- POC badge -->
  <rect x="194" y="16" width="24" height="13" rx="3" fill="#0d6efd" opacity="0.85"/>
